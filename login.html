<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 汽车产品营销Agent平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #050b18;
      --accent-cyan: #00e5ff;
      --accent-blue: #2979ff;
      --accent-purple: #7c4dff;
      --accent-pink: #ff4081;
      --glass-bg: rgba(15, 23, 50, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #e8edf5;
      --text-secondary: #8899bb;
      --text-muted: #556688;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* ========== Canvas 粒子背景 ========== */
    #particleCanvas {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== 网格暗纹 ========== */
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(41, 121, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(41, 121, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ========== 光晕 ========== */
    .orb {
      position: fixed;
      z-index: 0;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(120px);
      opacity: 0.18;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: var(--accent-cyan);
      top: -180px; right: -80px;
      animation: orbFloat1 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: var(--accent-purple);
      bottom: -120px; left: -60px;
      animation: orbFloat2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: var(--accent-blue);
      top: 45%; left: 55%;
      animation: orbFloat3 14s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-40px, 30px) scale(1.15); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, -25px) scale(1.1); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(calc(-50% + 30px), calc(-50% - 20px)) scale(1.2); }
    }

    /* ========== 登录卡片 ========== */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 420px;
    }

    .login-card {
      position: relative;
      background: linear-gradient(145deg,
        rgba(18, 28, 58, 0.8) 0%,
        rgba(25, 38, 75, 0.6) 50%,
        rgba(18, 28, 58, 0.8) 100%
      );
      border-radius: 20px;
      padding: 44px 38px 38px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      box-shadow:
        0 0 0 1px rgba(41, 121, 255, 0.12),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(41, 121, 255, 0.08);
      overflow: hidden;
    }

    /* 渐变边框效果 */
    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(135deg,
        rgba(0, 229, 255, 0.3),
        rgba(41, 121, 255, 0.1) 25%,
        rgba(124, 77, 255, 0.2) 50%,
        rgba(41, 121, 255, 0.1) 75%,
        rgba(0, 229, 255, 0.3)
      );
      background-size: 200% 200%;
      animation: borderGlow 4s ease-in-out infinite;
      z-index: -1;
      filter: blur(0px);
    }
    @keyframes borderGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* 顶部发光线条 */
    .card-shine {
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg,
        transparent,
        rgba(0, 229, 255, 0.5),
        rgba(124, 77, 255, 0.5),
        rgba(0, 229, 255, 0.5),
        transparent
      );
      opacity: 0.7;
    }

    /* ========== Logo 区 ========== */
    .logo-area {
      text-align: center;
      margin-bottom: 34px;
    }

    .logo-icon {
      width: 66px; height: 66px;
      margin: 0 auto 18px;
      position: relative;
    }
    .logo-hex {
      width: 66px; height: 66px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      position: relative;
    }
    .logo-hex::after {
      content: '';
      position: absolute;
      inset: 3px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      background: rgba(10, 18, 38, 0.9);
      z-index: 0;
    }
    .logo-hex span {
      position: relative;
      z-index: 1;
    }
    .logo-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.25), transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .logo-area .subtitle {
      font-size: 12.5px;
      color: var(--text-muted);
      letter-spacing: 1px;
      font-weight: 400;
    }

    .subtitle-dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: var(--accent-cyan);
      border-radius: 50%;
      margin: 0 8px;
      vertical-align: middle;
      box-shadow: 0 0 8px var(--accent-cyan);
      animation: pulse 2s ease-in-out infinite;
    }

    /* ========== 表单 ========== */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s;
      z-index: 1;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 14.5px;
      outline: none;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .form-group input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
    }

    .form-group input:focus {
      border-color: var(--accent-cyan);
      background: rgba(0, 229, 255, 0.04);
      box-shadow:
        0 0 0 4px rgba(0, 229, 255, 0.06),
        0 0 20px rgba(0, 229, 255, 0.06);
    }

    .form-group input:focus ~ .input-icon,
    .form-group input:focus + .input-icon {
      color: var(--accent-cyan);
    }

    /* 聚焦时图标变色 - 用 CSS 兄弟选择器不够，通过 JS 处理 */

    /* ========== 登录按钮 ========== */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 10px;
      letter-spacing: 3px;
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }
    .btn-login:hover::before {
      left: 100%;
    }

    .btn-login:hover {
      box-shadow:
        0 0 30px rgba(0, 229, 255, 0.35),
        0 8px 24px rgba(41, 121, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-login:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-login:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(30%);
    }

    /* ========== 错误提示 ========== */
    .error-msg {
      background: rgba(255, 64, 129, 0.08);
      border: 1px solid rgba(255, 64, 129, 0.2);
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff80ab;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      text-align: center;
      letter-spacing: 0.5px;
      animation: shake 0.4s ease;
    }
    .error-msg.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
    }

    /* ========== 加载动画 ========== */
    .btn-spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== 底部 ========== */
    .login-footer {
      text-align: center;
      margin-top: 26px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.9;
      letter-spacing: 0.5px;
    }
    .login-footer a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }
    .login-footer a:hover {
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
    }
    .footer-divider {
      display: inline-block;
      width: 1px;
      height: 10px;
      background: rgba(255,255,255,0.1);
      margin: 0 10px;
      vertical-align: middle;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 480px) {
      .login-wrapper { width: 92%; }
      .login-card { padding: 32px 24px 28px; }
      .logo-area h1 { font-size: 19px; letter-spacing: 1px; }
    }

    /* ========== 入场动画 ========== */
    .login-card {
      opacity: 0;
      transform: translateY(20px);
      animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .form-group:nth-child(1) { animation-delay: 0.2s; }
    .form-group:nth-child(2) { animation-delay: 0.3s; }
    .btn-login { animation-delay: 0.4s; }
    .btn-login, .form-group {
      animation-name: fadeUp;
      animation-fill-mode: forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 网格暗纹 -->
  <div class="grid-bg"></div>

  <!-- Canvas 粒子 -->
  <canvas id="particleCanvas"></canvas>

  <!-- 光晕 -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- 登录卡片 -->
  <div class="login-wrapper">
    <div class="login-card">
      <div class="card-shine"></div>

      <div class="logo-area">
        <div class="logo-icon">
          <div class="logo-glow"></div>
          <div class="logo-hex"><span>🚗</span></div>
        </div>
        <h1>汽车产品营销 Agent</h1>
        <p class="subtitle">
          AI 驱动<span class="subtitle-dot"></span>用户洞察<span class="subtitle-dot"></span>虚拟仿真
        </p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="return false;">
        <div class="form-group">
          <label>账号</label>
          <div class="input-wrapper">
            <span class="input-icon" id="iconAccount">◆</span>
            <input
              type="text"
              id="account"
              placeholder="输入试用账号"
              autocomplete="username"
              required
              onfocus="document.getElementById('iconAccount').style.color='var(--accent-cyan)'"
              onblur="document.getElementById('iconAccount').style.color='var(--text-muted)'"
            >
          </div>
        </div>

        <div class="form-group">
          <label>密码</label>
          <div class="input-wrapper">
            <span class="input-icon" id="iconPassword">◇</span>
            <input
              type="password"
              id="password"
              placeholder="输入密码"
              autocomplete="current-password"
              required
              onfocus="document.getElementById('iconPassword').style.color='var(--accent-cyan)'"
              onblur="document.getElementById('iconPassword').style.color='var(--text-muted)'"
            >
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin" onclick="handleLogin()">
          登 录
        </button>
      </form>

      <div class="login-footer">
        如需试用账号，请联系管理员开通<br>
        <span style="color:var(--text-muted);">后台管理</span>
        <span class="footer-divider"></span>
        <a href="admin.html">Admin Panel</a>
      </div>
    </div>
  </div>

  <script>
    // ========== 粒子背景 ==========
    (function(){
      var canvas = document.getElementById('particleCanvas');
      var ctx = canvas.getContext('2d');
      var w, h, particles = [];
      var count = 60;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      for (var i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          r: Math.random() * 2 + 0.5,
          alpha: Math.random() * 0.5 + 0.1
        });
      }

      function animate() {
        ctx.clearRect(0, 0, w, h);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 229, 255, ' + p.alpha + ')';
          ctx.fill();
        }

        // 连线
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = 'rgba(41, 121, 255, ' + (0.06 * (1 - dist / 120)) + ')';
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ========== 登录逻辑 ==========
    var isLoginProcessing = false;

    (async function init() {
      if (!window.SUPABASE_READY) {
        window.location.href = 'index.html';
        return;
      }
      initSupabase();
      var loggedIn = await window.Auth.isLoggedIn();
      if (loggedIn) {
        var isAdmin = await window.Auth.isAdmin();
        window.location.href = isAdmin ? 'admin.html' : 'index.html';
        return;
      }
      document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
    })();

    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      // 重触发 shake 动画
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
      setTimeout(function() { el.classList.remove('show'); }, 5000);
    }

    function setLoading(loading) {
      isLoginProcessing = loading;
      var btn = document.getElementById('btnLogin');
      var inputs = document.querySelectorAll('input');
      if (loading) {
        btn.innerHTML = '<span class="btn-spinner"></span>登录中...';
        btn.disabled = true;
        inputs.forEach(function(i) { i.disabled = true; });
      } else {
        btn.innerHTML = '登 录';
        btn.disabled = false;
        inputs.forEach(function(i) { i.disabled = false; });
      }
    }

    async function handleLogin() {
      if (isLoginProcessing) return;
      var account = document.getElementById('account').value.trim();
      var password = document.getElementById('password').value;
      if (!account || !password) {
        showError('请输入账号和密码');
        return;
      }
      setLoading(true);
      try {
        await window.Auth.login(account, password);
        var isAdmin = await window.Auth.isAdmin();
        window.location.href = isAdmin ? 'admin.html' : 'index.html';
      } catch (e) {
        var message = '登录失败，请检查账号和密码';
        if (e.message && e.message.includes('Invalid login')) {
          message = '账号或密码错误，请重试';
        } else if (e.message && e.message.includes('Email not confirmed')) {
          message = '账号邮箱尚未验证，请联系管理员';
        }
        showError(message);
        setLoading(false);
      }
    }
  </script>
</body>
</html>
